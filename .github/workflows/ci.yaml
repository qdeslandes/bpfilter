  benchmark:
    # needs: create-containers
    strategy:
      matrix:
        host:
          - name: "ubuntu-24.04"
            arch: "x64"
          - name: "4-core-ubuntu-arm"
            arch: "arm64"
    runs-on: ["${{ matrix.host.name }}"]
    name: "Benchmark: ${{ matrix.host.arch }}"
    container:
      image: ghcr.io/facebook/bpfilter:fedora-41-${{ matrix.host.arch }}
      options: --privileged
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      - name: Ensure we can read the Git repository
        run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: Configure build
        run: cmake -S $GITHUB_WORKSPACE -B $GITHUB_WORKSPACE/build -DWITH_BENCHMARK=on
      - name: Build
        run: make -C $GITHUB_WORKSPACE/build -j `nproc` benchmark
      - name: Fetch the cached benchmark results
        uses: actions/cache/restore@v4
        with:
          path: build/benchmark-cache
          key: bpfilter-benchmark-results-${{ matrix.host.arch }}
      - name: Copy the benchmark results to the cache
        run: mkdir -p $GITHUB_WORKSPACE/build/benchmark-cache && cp $GITHUB_WORKSPACE/build/output/*.json $GITHUB_WORKSPACE/build/benchmark-cache/; ls -lha $GITHUB_WORKSPACE/build; ls -lha $GITHUB_WORKSPACE/build/benchmark-cache
      - name: Cache the benchmark results
        uses: actions/cache/save@v4
        with:
          path: build/benchmark-cache
          key: bpfilter-benchmark-results-${{ matrix.host.arch }}

